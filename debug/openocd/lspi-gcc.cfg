# OpenOCD config for LSPI GCC project (GD32F4 series)
# If you are using ST-Link, replace cmsis-dap.cfg with stlink.cfg.
source [find interface/cmsis-dap.cfg]
transport select swd

# GD32F4xx is generally debug-compatible with stm32f4x target in OpenOCD.
source [find target/stm32f4x.cfg]

# Lower speed for first connection if unstable.
adapter speed 2000

# Optional reset behavior tuning.
reset_config srst_nogate
cortex_m reset_config sysresetreq